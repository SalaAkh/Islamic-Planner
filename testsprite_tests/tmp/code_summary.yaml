version: "2"
type: frontend
tech_stack:
  - HTML5
  - Vanilla JS
  - Tailwind CSS
  - Vite
  - Firebase (Hosting)
routes:
  - path: /
    file: index.html
    auth_required: false
    description: Landing page for Barakah Planner
  - path: /app.html
    file: app.html
    auth_required: false
    description: Main planner application functionality
features:
  - name: Navigation and Localization
    description: User can switch between RU, KK, EN, and AR languages and navigate to the app.
    files:
      - index.html
    entry_route: /
    user_interactions:
      - Click RU/KK/EN/AR language switchers
      - Click "Open App" button
    api_calls: []
    auth_required: false
  - name: Prayer Tracker
    description: View and mark 5 daily prayers (Fajr, Dhuhr, Asr, Maghrib, Isha)
    files:
      - app.html
    entry_route: /app.html
    user_interactions:
      - View prayer times
      - Check/uncheck completed prayers
    api_calls: []
    auth_required: false
  - name: Goals and Tasks
    description: Plan Akhira and Dunya goals
    files:
      - app.html
    entry_route: /app.html
    user_interactions:
      - View tasks and goals
      - Mark tasks as completed
    api_calls: []
    auth_required: false
known_limitations: []
